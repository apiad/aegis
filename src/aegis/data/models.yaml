# aegis model registry — provider → model → {context_window, prices, aliases}.
#
# This is the canonical list. aegis ships a bundled copy under
# src/aegis/data/models.yaml; at boot, the CLI fires a best-effort
# background fetch of
#   https://raw.githubusercontent.com/apiad/aegis/main/src/aegis/data/models.yaml
# into ~/.cache/aegis/models.yaml. The cache wins over the bundled file
# when it's present and newer (so updates propagate without a release).
#
# Prices are per-million-tokens in USD, written as strings so the loader
# can use Decimal arithmetic without float drift.
#
# aliases: alternate model names the underlying CLI accepts that map to
# the same canonical entry (so e.g. claude-opus-4-7 gets opus's prices).
#
# context_window_patterns is a fallback list applied to the model name
# (lowercase substring match, first wins) when no exact or alias entry
# matches — this preserves the prior pattern-based behavior (e.g. any
# model name containing "1m" gets the 1M context window).
#
# When a new model lands: add an entry here, push to main, every aegis
# installation picks it up within 24h via the background refresh.
version: 1
updated: "2026-05-28"

providers:
  # ---------------------------------------------------------------------
  # Claude Code (Anthropic CLI). Accepts both nicknames (opus / sonnet /
  # haiku) and explicit version IDs (claude-opus-4-7 etc.). The nickname
  # is the canonical entry; the version ID is an alias so lookups work
  # either way.
  # ---------------------------------------------------------------------
  claude-code:
    default_context_window: 200000
    context_window_patterns:
      - { match: "1m",   context_window: 1000000 }
      - { match: "opus", context_window: 1000000 }
    models:
      opus:
        label: "claude-opus-4-7"
        aliases: [claude-opus-4-7, claude-opus-4]
        context_window: 1000000
        prices:
          input:       "15.00"
          output:      "75.00"
          cache_hit:   "1.50"
          cache_write: "18.75"
          thinking:    "75.00"
      sonnet:
        label: "claude-sonnet-4-6"
        aliases: [claude-sonnet-4-6, claude-sonnet-4-5, claude-sonnet-4]
        context_window: 200000
        prices:
          input:       "3.00"
          output:      "15.00"
          cache_hit:   "0.30"
          cache_write: "3.75"
          thinking:    "15.00"
      haiku:
        label: "claude-haiku-4-5"
        aliases: [claude-haiku-4-5-20251001, claude-haiku-4-5]
        context_window: 200000
        prices:
          input:       "1.00"
          output:      "5.00"
          cache_hit:   "0.10"
          cache_write: "1.25"
          thinking:    "5.00"

  # ---------------------------------------------------------------------
  # Gemini CLI (`gemini --acp`). Model names go through the CLI's -m
  # flag and match Google AI Studio model IDs verbatim.
  # ---------------------------------------------------------------------
  gemini:
