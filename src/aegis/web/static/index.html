<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>aegis</title>
  <meta name="theme-color" content="#0b0e14" />
  <link rel="manifest" href="/manifest.webmanifest" crossorigin="use-credentials" />
  <link rel="icon" href="/static/icons/icon.svg" />
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png" />
  <link id="theme-link" rel="stylesheet" href="/theme.css" />
</head>
<body>
  <div id="app">
    <div id="conn-banner" hidden>reconnecting…</div>
    <button id="install-btn" type="button" hidden>⤓ Install app</button>
    <button id="back-btn" type="button">‹ sessions</button>
    <nav id="tabbar"></nav>
    <header id="statusbar">
      <span id="status-dot" class="dot"></span>
      <span id="status-handle">—</span>
      <span id="status-metrics"></span>
    </header>
    <div id="queuestrip" title="Queues (Alt+Q)"></div>
    <main id="panes"></main>
    <footer id="composer">
      <textarea id="input" rows="1" placeholder="Message the agent…  (Enter to send · Shift+Enter newline · Esc to interrupt)"></textarea>
    </footer>
  </div>
  <div id="modal-root"></div>
  <script type="module" src="/static/js/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", async () => {
        try {
          await navigator.serviceWorker.register("/service-worker.js");
          await navigator.serviceWorker.ready;
          // First load registers the SW but the page stays uncontrolled;
          // Chrome needs a controlling SW for installability. Reload once so
          // the next navigation is controlled. After the reload the page loads
          // controlled, so this is a no-op (no loop).
          if (!navigator.serviceWorker.controller) location.reload();
        } catch (e) {}
      });
    }
  </script>
</body>
</html>
