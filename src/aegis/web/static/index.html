<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>aegis</title>
  <meta name="theme-color" content="#0b0e14" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/static/icons/icon.svg" />
  <link rel="apple-touch-icon" href="/static/icons/icon.svg" />
  <link id="theme-link" rel="stylesheet" href="/theme.css" />
</head>
<body>
  <div id="app">
    <div id="conn-banner" hidden>reconnecting…</div>
    <nav id="tabbar"></nav>
    <header id="statusbar">
      <span id="status-dot" class="dot"></span>
      <span id="status-handle">—</span>
      <span id="status-metrics"></span>
    </header>
    <div id="queuestrip" title="Queues (Alt+Q)"></div>
    <main id="panes"></main>
    <footer id="composer">
      <textarea id="input" rows="1" placeholder="Message the agent…  (Enter to send · Shift+Enter newline · Esc to interrupt)"></textarea>
    </footer>
  </div>
  <div id="modal-root"></div>
  <script type="module" src="/static/js/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/service-worker.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
