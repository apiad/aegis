name: release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Trusted publishing requires `id-token: write`; we don't store a token
# in the repo. See https://docs.pypi.org/trusted-publishers/
permissions:
  contents: read
  id-token: write

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/aegis-harness/
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Sanity check — tag matches pyproject version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PYVER="$(grep -E '^version = ' pyproject.toml | sed -E 's/version = "(.*)"/\1/')"
          if [ "$TAG" != "$PYVER" ]; then
            echo "::error::tag $TAG does not match pyproject version $PYVER"
            exit 1
          fi

      - name: Run hermetic tests
        run: |
          uv sync --locked
          uv run pytest -q -k "not live"

      - name: Build sdist + wheel
        run: uv build

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
