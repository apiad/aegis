site_name: Aegis
site_description: A multi-agent meta-harness for coding agents.
site_url: https://apiad.github.io/aegis/
repo_url: https://github.com/apiad/aegis
repo_name: apiad/aegis
edit_uri: edit/main/docs/

docs_dir: docs
exclude_docs: |
  superpowers/

theme:
  name: material
  palette:
    - scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tabs
    - content.code.copy
    - content.code.annotate
    - toc.follow
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - stylesheets/aegis.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_signature_annotations: true
            separate_signature: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            merge_init_into_class: true

nav:
  - Home: index.md
  - Getting started:
      - Install: install.md
      - Usage: usage.md
      - Configuration: configuration.md
  - Concepts:
      - Drivers: drivers.md
      - Queues: queues.md
      - Canvas: canvas.md
      - Terminals: terminals.md
      - Workflows: workflows.md
      - Groups: groups.md
      - MCP plane: mcp.md
  - Reference:
      - Architecture: architecture.md
      - API: api.md
      - Roadmap: roadmap.md
